<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Model Sorting - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        @keyframes correct-animation {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .correct-answer { animation: correct-animation 1s ease-out; border-color: #22c55e; border-width: 4px; }
        
        @keyframes incorrect-animation {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .incorrect-answer { animation: incorrect-animation 0.4s linear; border-color: #ef4444; border-width: 4px; }
        
        #custom-select-options { transition: opacity 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-2">

    <div id="game-scroll-wrapper" class="w-full max-w-md max-h-[98vh] overflow-y-auto bg-white rounded-2xl shadow-xl border border-gray-200">
        <div id="game-container" class="p-4 md:p-6">

            <div class="text-center mb-4">
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Financial Model Sorting</h1>
                <div class="flex flex-wrap justify-between items-center mt-2 px-2 text-[10px] font-bold text-gray-500 uppercase">
                    <p id="round-counter">Item 1/16</p>
                    <p id="score-display">Score: 0 / 0</p>
                    <p>Plays: <span id="plays-display">0</span></p>
                </div>
            </div>

            <div id="image-display" class="bg-gray-50 rounded-xl p-4 mb-2 min-h-[220px] flex items-center justify-center border-2 border-dashed border-gray-200 transition-all duration-300">
                </div>

            <div id="correct-answer-display" class="text-center text-red-600 font-bold mb-4 min-h-[1.5rem] text-sm italic"></div>

            <div id="controls" class="space-y-3">
                <div class="relative" id="custom-select-container">
                    <button id="custom-select-button" type="button" class="w-full p-4 flex items-center justify-between bg-white border-2 border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-blue-100">
                        <span id="selected-option-text" class="flex items-center gap-3 font-semibold text-gray-700">
                            Select a model...
                        </span>
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
                    </button>
                    
                    <div id="custom-select-options" class="absolute z-50 w-full mt-2 bg-white border-2 border-gray-200 rounded-xl shadow-2xl hidden max-h-80 overflow-y-auto">
                        </div>
                </div>
                
                <button id="check-answer-btn" class="w-full py-4 bg-blue-600 text-white font-black text-lg rounded-xl shadow-lg active:scale-95 transition-transform">CHECK ANSWER</button>
                <button id="next-item-btn" class="w-full py-4 bg-gray-700 text-white font-black text-lg rounded-xl shadow-lg hidden">NEXT ITEM</button>
            </div>
        </div>
    </div>
    
    <div id="success-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center hidden z-[100]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-xs w-full mx-4">
            <h3 class="text-3xl font-black text-green-600">🏆 FINISHED!</h3>
            <p id="final-score-message" class="text-slate-600 mt-4 font-medium text-lg"></p>
            <button onclick="location.reload()" class="mt-8 w-full py-4 bg-green-500 text-white font-black rounded-2xl shadow-lg hover:bg-green-600">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const allItemsData = [
                { id: 'i1', src: 'Compound 1.png', cat: 'compound' },
                { id: 'i2', src: 'Compound 2.png', cat: 'compound' },
                { id: 'i3', src: 'Compound 3.png', cat: 'compound' },
                { id: 'i4', src: 'Exponential 1.png', cat: 'exponential' },
                { id: 'i5', src: 'Exponential 2.png', cat: 'exponential' },
                { id: 'i6', src: 'Exponential 3.png', cat: 'exponential' },
                { id: 'i7', src: 'Grow 1.png', cat: 'grow' },
                { id: 'i8', src: 'Linear 1.png', cat: 'linear' },
                { id: 'i9', src: 'Linear 2.png', cat: 'linear' },
                { id: 'i10', src: 'Linear 3.png', cat: 'linear' },
                { id: 'i11', src: 'Linear 4.png', cat: 'linear' },
                { id: 'i12', src: 'Logistic 1.png', cat: 'logistic' },
                { id: 'i13', src: 'Shrink 1.png', cat: 'shrink' },
                { id: 'i14', src: 'Shrink 2.png', cat: 'shrink' },
                { id: 'i15', src: 'Shrink 3.png', cat: 'shrink' },
                { id: 'i16', src: 'Shrink 4.png', cat: 'shrink' }
            ];
            
            const categoriesData = [
                { value: 'linear', text: 'Linear', imageSrc: 'Linear Formula.png' },
                { value: 'exponential', text: 'Exponential', imageSrc: 'Exponential Formula.png' },
                { value: 'logistic', text: 'Logistic', imageSrc: 'Logistic Formula.png' },
                { value: 'compound', text: 'Compound Interest', imageSrc: 'Compound Formula.png' },
                { value: 'grow', text: 'Growth', imageSrc: 'Grow Formula.png' },
                { value: 'shrink', text: 'Shrinkage', imageSrc: 'Shrink Formula.png' }
            ];

            let currentItemIndex = 0, shuffledItems = [], score = 0, attempted = 0, selectedValue = null;
            let totalPlays = parseInt(localStorage.getItem('sortingGamePlays')) || 0;
            document.getElementById('plays-display').innerText = totalPlays;

            const wrapper = document.getElementById('game-scroll-wrapper');
            const display = document.getElementById('image-display');
            const selectBtn = document.getElementById('custom-select-button');
            const optionsBox = document.getElementById('custom-select-options');
            const selectedText = document.getElementById('selected-option-text');
            const checkBtn = document.getElementById('check-answer-btn');
            const nextBtn = document.getElementById('next-item-btn');

            const correctSound = new Tone.PolySynth(Tone.Synth).toDestination();
            const incorrectSound = new Tone.Synth({ oscillator: { type: "square" } }).toDestination();

            function init() {
                shuffledItems = [...allItemsData].sort(() => Math.random() - 0.5);
                buildDropdown();
                render(0);
                
                selectBtn.onclick = (e) => {
                    e.stopPropagation();
                    optionsBox.classList.toggle('hidden');
                    if (!optionsBox.classList.contains('hidden')) {
                        setTimeout(() => wrapper.scrollTo({ top: wrapper.scrollHeight, behavior: 'smooth' }), 100);
                    }
                };

                window.onclick = () => optionsBox.classList.add('hidden');
                checkBtn.onclick = check;
                nextBtn.onclick = advance;
            }

            function buildDropdown() {
                optionsBox.innerHTML = '';
                categoriesData.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'p-4 border-b border-gray-100 hover:bg-blue-50 cursor-pointer';
                    div.innerHTML = `
                        <p class="font-bold text-gray-800 mb-2 uppercase text-xs tracking-widest">${cat.text}</p>
                        <img src="${encodeURIComponent(cat.imageSrc)}" class="w-full h-auto object-contain rounded-lg border border-gray-200">
                    `;
                    div.onclick = () => {
                        selectedText.innerHTML = `<span class="text-blue-600">Selected:</span> ${cat.text}`;
                        selectedValue = cat.value;
                        optionsBox.classList.add('hidden');
                    };
                    optionsBox.appendChild(div);
                });
            }

            function render(index) {
                display.innerHTML = '';
                display.classList.remove('correct-answer', 'incorrect-answer');
                document.getElementById('correct-answer-display').textContent = '';
                
                const item = shuffledItems[index];
                const img
